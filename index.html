<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 Sayanox LOL Calculator by Sayan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Comic Sans MS', cursive; 
            background: linear-gradient(-45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #f0932b, #ff9ff3);
            background-size: 500% 500%;
            animation: gradientShift 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        
        .calculator { 
            background: rgba(255,255,255,0.97); 
            backdrop-filter: blur(25px);
            border-radius: 35px; 
            padding: 30px;
            box-shadow: 0 35px 70px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }
        
        @media (max-width: 480px) {
            .calculator { padding: 25px 20px; border-radius: 25px; }
            button { width: 65px !important; height: 65px !important; margin: 8px !important; font-size: 1.4em !important; }
            h1 { font-size: 2.2em !important; }
            .display { font-size: 2.5em !important; padding: 25px 20px !important; }
        }
        
        .calculator::before {
            content: '😂 SAYANOX 😂'; 
            position: absolute; 
            top: -60px; 
            right: -60px; 
            font-size: 120px; 
            opacity: 0.08; 
            animation: float 5s ease-in-out infinite;
            font-weight: bold;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-25px) rotate(10deg); } }
        
        .header { margin-bottom: 20px; }
        h1 { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ffd93d); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 2.8em; 
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            animation: rainbow 3s ease-in-out infinite alternate;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .company { 
            color: #ff6b6b; 
            font-size: 1.2em; 
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .display { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            font-size: 3.2em; 
            padding: 30px; 
            margin: 25px 0; 
            border-radius: 25px; 
            min-height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            box-shadow: inset 0 12px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        .display::after {
            content: attr(data-meme); 
            position: absolute; 
            top: 12px; 
            left: 15px; 
            font-size: 0.45em; 
            opacity: 0.85; 
            color: #fff;
            font-weight: bold;
            max-width: 60%;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
            justify-items: center;
            margin-bottom: 25px;
            max-width: 350px;
            margin-left: auto;
            margin-right: auto;
        }
        
        button { 
            width: 75px; 
            height: 75px; 
            border: none; 
            border-radius: 50%; 
            font-size: 1.6em; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            position: relative; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        button:hover { transform: scale(1.15) rotate(8deg); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        button:active { transform: scale(0.92) rotate(-5deg); }
        
        .num { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .op { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #fff; }
        .equals { 
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); 
            color: #fff; 
            font-size: 2.2em !important; 
            animation: pulse 1.5s infinite;
            grid-column: 4;
            grid-row: 5;
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(250,112,154,0.7); } 
            70% { box-shadow: 0 0 0 20px rgba(250,112,154,0); } 
            100% { box-shadow: 0 0 0 0 rgba(250,112,154,0); } 
        }
        .zero { grid-column: 1 / span 2; grid-row: 5; width: 160px !important; border-radius: 40px !important; }
        .clear { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #333; font-size: 1.3em; }
        .fun { 
            background: linear-gradient(135deg, #a8e6cf 0%, #88d8a3 100%); 
            color: #333; 
            animation: shake 0.6s infinite; 
            grid-column: 1;
            grid-row: 1;
        }
        @keyframes shake { 
            0%, 100% { transform: translateX(0) rotate(0deg); } 
            25% { transform: translateX(-6px) rotate(-2deg); } 
            75% { transform: translateX(6px) rotate(2deg); } 
        }
        
        .joke { 
            margin-top: 25px; 
            padding: 20px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7)); 
            border-radius: 20px; 
            font-size: 1.15em; 
            min-height: 70px;
            border: 2px dashed #ff6b6b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            line-height: 1.4;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
            font-weight: bold;
        }
        @keyframes shakeCalc {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    
    <div class="calculator" id="calculator">
        <div class="header">
            <h1>😂 LOL Calculator</h1>
            <div class="company">by Sayan | Sayanox Company 🛠️</div>
        </div>
        
        <div class="display" id="display" data-meme="">0</div>
        
        <div class="buttons">
            <button class="fun" onclick="randomJoke()">🎉</button>
            <button class="clear" onclick="clearAll()">🧹</button>
            <button class="clear" onclick="deleteLast()">⌫</button>
            <button class="op" onclick="appendToDisplay('/')">÷</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('*')">×</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="op" onclick="appendToDisplay('+')">+</button>
            
            <button class="num zero" onclick="appendToDisplay('0')">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
        
        <div class="joke" id="joke">Click 🎉 for Sayanox Math Jokes! 🤓💥</div>
        <div class="footer">Made with 🔥 by Sayan @ Sayanox Company</div>
    </div>

    <script>
        let display = '0';
        let jokes = [
            "Why was the equal sign so humble? Sayan taught it! 😂 - Sayanox",
            "Why did 7 eat 9? Sayanox special diet! 7 8 9! 🤣",
            "Sayan's friends who love math? Sayanbros! 👬💯",
            "Why can't you trust atoms? Sayanox says they make up everything! ⚛️",
            "Parallel lines by Sayan? Never meet but always together! 😎",
            "Sayanox Calculator: Math + Masti = Epic! 🎉",
            "Sayan's formula: Code + Fun = Sayanox! 🧮✨"
        ];

        function updateDisplay() {
            document.getElementById('display').textContent = display;
        }

        function appendToDisplay(value) {
            if (display === '0' || display === 'Error' || display === 'Sayanox Error! 😂💥') {
                display = '';
            }
            if (value === '.' && display.includes('.')) return; 
            display += value;
            updateDisplay();
            shakeCalculator();
        }

        function clearAll() {
            display = '0';
            updateDisplay();
            document.getElementById('joke').innerHTML = 'Sayanox Clean Sweep! 🧹✨';
            document.getElementById('display').removeAttribute('data-meme');
        }

        function deleteLast() {
            display = display.slice(0, -1) || '0';
            updateDisplay();
        }

        function calculate() {
            try {
                let expression = display.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(expression);
                
                if (!isFinite(result)) throw 'Error';
                
                display = Math.round(result * 10000000) / 10000000 + '';
                updateDisplay();
                
                const rand = Math.random();
                if (rand < 0.5) showMeme("Sayan approved! ✅");
                else randomJoke();
                
            } catch (error) {
                display = 'Sayanox Error! 😂💥';
                updateDisplay();
                shakeHard();
            }
        }

        function randomJoke() {
            const joke = jokes[Math.floor(Math.random() * jokes.length)];
            document.getElementById('joke').innerHTML = joke;
            shakeCalculator();
        }

        function showMeme(text) {
            document.getElementById('display').setAttribute('data-meme', text);
        }

        function shakeCalculator() {
            const calc = document.getElementById('calculator');
            calc.style.animation = 'shakeCalc 0.4s';
            setTimeout(() => calc.style.animation = '', 400);
        }

        function shakeHard() {
            const calc = document.getElementById('calculator');
            calc.style.animation = 'shakeCalc 0.2s infinite';
            setTimeout(() => calc.style.animation = '', 600);
        } 
    </script>
</body>
</html>
