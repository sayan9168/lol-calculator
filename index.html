<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 Sayanox LOL Calculator by Sayan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Comic Sans MS', cursive; 
            background: linear-gradient(-45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #f0932b, #ff9ff3);
            background-size: 500% 500%;
            animation: gradientShift 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        .calculator { 
            background: rgba(255,255,255,0.97); 
            backdrop-filter: blur(25px);
            border-radius: 35px; 
            padding: 35px; 
            box-shadow: 0 35px 70px rgba(0,0,0,0.4);
            max-width: 420px; 
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .calculator::before {
            content: '😂 SAYANOX 😂'; 
            position: absolute; 
            top: -60px; 
            right: -60px; 
            font-size: 120px; 
            opacity: 0.08; 
            animation: float 5s ease-in-out infinite;
            font-weight: bold;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-25px) rotate(10deg); } }
        
        .header {
            margin-bottom: 20px;
        }
        h1 { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ffd93d); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 2.8em; 
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            animation: rainbow 3s ease-in-out infinite alternate;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .company { 
            color: #ff6b6b; 
            font-size: 1.2em; 
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .display { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            font-size: 3.2em; 
            padding: 30px; 
            margin: 25px 0; 
            border-radius: 25px; 
            min-height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            box-shadow: inset 0 12px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        .display::after {
            content: attr(data-meme); 
            position: absolute; 
            top: 12px; 
            left: 15px; 
            font-size: 0.45em; 
            opacity: 0.85; 
            color: #fff;
            font-weight: bold;
            max-width: 60%;
        }
        
        button { 
            width: 75px; height: 75px; 
            border: none; border-radius: 50%; 
            font-size: 1.6em; font-weight: bold;
            margin: 10px; cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            position: relative; overflow: hidden;
        }
        button::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: left 0.5s;
        }
        button:hover::before { left: 100%; }
        button:hover { transform: scale(1.15) rotate(8deg); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        button:active { transform: scale(0.92) rotate(-5deg); }
        
        .num { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .op { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #fff; }
        .equals { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #fff; font-size: 2.2em !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(250,112,154,0.7); } 70% { box-shadow: 0 0 0 20px rgba(250,112,154,0); } 100% { box-shadow: 0 0 0 0 rgba(250,112,154,0); } }
        .clear { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #333; font-size: 1.3em; }
        .fun { background: linear-gradient(135deg, #a8e6cf 0%, #88d8a3 100%); color: #333; animation: shake 0.6s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0) rotate(0deg); } 25% { transform: translateX(-6px) rotate(-2deg); } 75% { transform: translateX(6px) rotate(2deg); } }
        
        .joke { 
            margin-top: 25px; 
            padding: 20px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7)); 
            border-radius: 20px; 
            font-size: 1.15em; 
            min-height: 70px;
            border: 2px dashed #ff6b6b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .party { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
        .confetti { 
            position: absolute; 
            width: 12px; height: 12px; 
            animation: confetti-fall 4s linear infinite; 
            border-radius: 50%;
        }
        @keyframes confetti-fall { 
            0% { transform: translateY(-100vh) rotate(0deg) scale(0); opacity: 1; } 
            50% { opacity: 1; scale(1); }
            100% { transform: translateY(100vh) rotate(1080deg) scale(0); opacity: 0; } 
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="party" id="party"></div>
    
    <div class="calculator">
        <div class="header">
            <h1>😂 LOL Calculator</h1>
            <div class="company">by Sayan | Sayanox Company 🛠️</div>
        </div>
        
        <div class="display" id="display">0</div>
        
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; justify-items: center; margin-bottom: 25px;">
            <button class="fun" onclick="randomJoke()">🎉</button>
            <button class="clear" onclick="clearAll()">🧹</button>
            <button class="clear" onclick="deleteLast()">⌫</button>
            <button class="op" onclick="appendToDisplay('/')">÷</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('*')">×</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="op" onclick="appendToDisplay('+')">+</button>
            
            <button class="num" style="grid-column: span 2;" onclick="appendToDisplay('0')" id="zero">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
        
        <div class="joke" id="joke">Click 🎉 for Sayanox Math Jokes! 🤓💥</div>
        <div class="footer">Made with 🔥 by Sayan @ Sayanox Company</div>
    </div>

    <script>
        let display = '0';
        let memes = [
            'Sayanox Math Magic! ✨', 
            'Calculator > Sayan\'s Brain? 🤔', 
            'Sayan says: Calculate kr! 💪', 
            'Sayanox = Math + Fun 😂',
            'By Sayan = Quality guaranteed! 🏆'
        ];
        let jokes = [
            "Why was the equal sign so humble? Sayan taught it! 😂 - Sayanox",
            "Why did 7 eat 9? Sayanox special diet! 7 8 9! 🤣",
            "Sayan's friends who love math? Sayanbros! 👬💯",
            "Why can't you trust atoms? Sayanox says they make up everything! ⚛️",
            "Parallel lines by Sayan? Never meet but always together! 😎",
            "Sayanox Calculator: Math + Masti = Epic! 🎉",
            "Sayan's formula: Code + Fun = Sayanox! 🧮✨"
        ];

        function updateDisplay() {
            document.getElementById('display').textContent = display;
        }

        function appendToDisplay(value) {
            if (display === '0' || display === 'Error') display = '';
            display += value;
            updateDisplay();
            shakeCalculator();
        }

        function clearAll() {
            display = '0';
            updateDisplay();
            document.getElementById('joke').innerHTML = 'Sayanox Clean Sweep! 🧹✨';
            playSound('clean');
        }

        function deleteLast() {
            display = display.slice(0, -1) || '0';
            updateDisplay();
            playSound('delete');
        }

        function calculate() {
            playSound('click');
            try {
                let result = eval(display.replace('×', '*').replace('÷', '/'));
                if (!isFinite(result)) throw 'Error';
                display = Math.round(result * 10000000000) / 10000000000 + ''; // Precision fix
                display = display.slice(0, 14);
                updateDisplay();
                
                // Sayanox SUPER FUNNY reactions!
                const rand = Math.random();
                if (rand < 0.25) partyTime();
                else if (rand < 0.5) epicMeme(result);
                else if (rand < 0.75) sayanJoke();
                else crazyResult(result);
                
            } catch {
                display = 'Sayanox Error! 😂💥';
                updateDisplay();
                shakeHard();
                showMeme('Math + Sayan = Chaos! 🤯');
                playSound('error');
            }
        }

        function randomJoke() {
            const joke = jokes[Math.floor(Math.random() * jokes.length)];
            document.getElementById('joke').innerHTML = joke;
            shakeCalculator();
            playSound('joke');
        }

        function epicMeme(result) {
            const memes = [
                `Sayanox says: ${result} is MAGIC! ✨`,
                `Sayan approves this result! 👍 ${result}`,
                `WOW Sayanox Power! ${result} 🤯`,
                `Sayan's brain calculated: ${result} 🧠`
            ];
            showMeme(memes[Math.floor(Math.random() * memes.length)]);
        }

        function sayanJoke() {
            randomJoke();
        }

        function crazyResult(result) {
            if (result > 1000) showMeme('Sayanox SUPER NUMBER! 🚀');
            else if (result === '69') showMeme('Sayanox Nice! 😏');
            else if (result === '420') showMeme('Sayanox Legend! 🔥');
            else showMeme('Sayanox Approved! ✅');
        }

        function showMeme(text) {
            document.getElementById('display').setAttribute('data-meme', text);
        }

        function shakeCalculator() {
            const calc = document.querySelector('.calculator');
            calc.style.animation = 'shake 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            setTimeout(() => calc.style.animation = '', 400);
        }

        function shakeHard() {
            const calc = document.querySelector('.calculator');
            calc.style.animation = 'shake 0.8s infinite';
            setTimeout(() => calc.style.animation = '', 1600);
        }

        function partyTime() {
            const party = document.getElementById('party');
            party.innerHTML = '';
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b', '#ff9ff3', '#ffd93d'];
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 3) + 's';
                party.appendChild(confetti);
                setTimeout(() => confetti.remove(), 6000);
            }
            showMeme('SAYANOX PARTY TIME! 🎉🎊');
            playSound('party');
        }

        // Sound Effects (Web Audio API)
        function playSound(type) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'party') {
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
            } else if (type === 'error') {
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(100, audioContext.currentTime + 0.1);
            } else {
                oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(900, audioContext.currentTime + 0.05);
            }
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        updateDisplay();
    </script>
</body>
    </html>
