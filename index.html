<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 LOL Calculator - Just for Fun!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Comic Sans MS', cursive; 
            background: linear-gradient(-45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24, #f0932b);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .calculator { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px);
            border-radius: 30px; 
            padding: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-width: 400px; 
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .calculator::before {
            content: '😂😂😂'; position: absolute; top: -50px; right: -50px; font-size: 100px; opacity: 0.1; animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        
        h1 { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 2.5em; 
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .display { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            font-size: 3em; 
            padding: 25px; 
            margin: 20px 0; 
            border-radius: 20px; 
            min-height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .display::after {
            content: attr(data-meme); position: absolute; top: 10px; left: 10px; font-size: 0.4em; opacity: 0.8; color: #fff;
        }
        button { 
            width: 70px; height: 70px; 
            border: none; border-radius: 50%; 
            font-size: 1.5em; font-weight: bold;
            margin: 8px; cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
        }
        button:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.95); }
        
        .num { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .op { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #fff; }
        .equals { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #fff; font-size: 2em !important; }
        .clear { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #333; font-size: 1.2em; }
        .fun { background: linear-gradient(135deg, #a8e6cf 0%, #88d8a3 100%); color: #333; animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .joke { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.8); border-radius: 15px; font-size: 1.1em; min-height: 60px; }
        .party { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; }
        .confetti { position: absolute; width: 10px; height: 10px; background: #ff6b6b; animation: confetti-fall 3s linear infinite; }
        @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
    <div class="party" id="party"></div>
    
    <div class="calculator">
        <h1>😂 LOL Calculator</h1>
        <div class="display" id="display">0</div>
        
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; justify-items: center; margin-bottom: 20px;">
            <button class="fun" onclick="randomJoke()">🎉</button>
            <button class="clear" onclick="clearAll()">C</button>
            <button class="clear" onclick="deleteLast()">⌫</button>
            <button class="op" onclick="appendToDisplay('/')">÷</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('*')">×</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="op" onclick="appendToDisplay('+')">+</button>
            
            <button class="num" style="grid-column: span 2;" onclick="appendToDisplay('0')" id="zero">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()" style="grid-column: span 1;">=</button>
        </div>
        
        <div class="joke" id="joke">Click 🎉 for math jokes! 🤓</div>
    </div>

    <script>
        let display = '0';
        let memes = ['Math is hard 😭', 'Calculator > Brain 🧠', 'I did the math... you owe me pizza 🍕', 'Numbers are my fren 😎'];
        let jokes = [
            "Why was the equal sign so humble? It knew it wasn't less than or greater than anyone else! 😂",
            "Why did 7 eat 9? Because 7 8 9! (Seven ate nine) 🤣",
            "What do you call friends who love math? Algebros! 👬",
            "Why can't you trust atoms? They make up everything! ⚛️",
            "Parallel lines have so much in common... it's a shame they'll never meet! 😢"
        ];

        function updateDisplay() {
            document.getElementById('display').textContent = display;
        }

        function appendToDisplay(value) {
            if (display === '0' || display === 'Error') display = '';
            display += value;
            updateDisplay();
            shakeCalculator();
        }

        function clearAll() {
            display = '0';
            updateDisplay();
            document.getElementById('joke').textContent = 'Fresh start! 🧹';
        }

        function deleteLast() {
            display = display.slice(0, -1) || '0';
            updateDisplay();
        }

        function calculate() {
            try {
                let result = eval(display.replace('×', '*').replace('÷', '/'));
                if (!isFinite(result)) throw 'Error';
                display = result.toString().slice(0, 12);
                updateDisplay();
                
                // Funny reaction!
                const rand = Math.random();
                if (rand < 0.3) partyTime();
                else if (rand < 0.6) showMeme('WOW! ' + result + '?! 🤯');
                else showJoke();
                
            } catch {
                display = 'Error 😂';
                updateDisplay();
                shakeHard();
                showMeme('Math broke! 💥');
            }
        }

        function randomJoke() {
            const joke = jokes[Math.floor(Math.random() * jokes.length)];
            document.getElementById('joke').innerHTML = joke;
            shakeCalculator();
        }

        function showMeme(text) {
            document.getElementById('display').setAttribute('data-meme', text);
        }

        function showJoke() {
            randomJoke();
        }

        function shakeCalculator() {
            document.querySelector('.calculator').style.animation = 'shake 0.3s';
            setTimeout(() => document.querySelector('.calculator').style.animation = '', 300);
        }

        function shakeHard() {
            document.querySelector('.calculator').style.animation = 'shake 0.6s infinite';
            setTimeout(() => document.querySelector('.calculator').style.animation = '', 1200);
        }

        function partyTime() {
            const party = document.getElementById('party');
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b'][Math.floor(Math.random()*5)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                party.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
            showMeme('PARTY TIME! 🎉');
        }

        updateDisplay();
    </script>
</body>
              </html>
